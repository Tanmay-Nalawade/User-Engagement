apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-engagement-api
  namespace: user-engagement
  labels:
    app: user-engagement-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-engagement-api
  template:
    metadata:
      labels:
        app: user-engagement-api
    spec:
      containers:
        - name: api
          image: user-engagement-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: user-engagement-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: user-engagement-secrets
                  key: MONGODB_URI
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
